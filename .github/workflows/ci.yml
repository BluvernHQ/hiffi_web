name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - new-main
      - hiffi_dev_v2

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          NEXT_PUBLIC_APP_BUILD_ID: ${{ github.sha }}
        run: npm run build

